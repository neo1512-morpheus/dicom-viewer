<!doctype html>
<html lang="en">

<head>
  <script>
    console.warn("🚨 TRACER: ROOT index.html loaded (Main App)");
    window.WHICH_APP_IS_THIS = "MAIN_APP";

    // Performance: Suppress high-frequency OpenJPEG decoder logs
    // These synchronous logs block the main thread during volume decode
    (function () {
      const originalLog = console.log;
      const originalInfo = console.info;
      const blockedPatterns = ['j2k', 'header of tile', 'main header', 'correctly decoded'];

      function shouldBlock(args) {
        if (!args || args.length === 0) return false;
        const msg = String(args[0]).toLowerCase();
        return blockedPatterns.some(p => msg.includes(p));
      }

      console.log = function (...args) {
        if (!shouldBlock(args)) originalLog.apply(console, args);
      };
      console.info = function (...args) {
        if (!shouldBlock(args)) originalInfo.apply(console, args);
      };
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>temp_app</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
