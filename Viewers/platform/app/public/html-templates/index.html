  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    .viewer-boot {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #dbeafe;
    }

    .viewer-boot__panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }

    .viewer-boot__logo {
      width: 168px;
      height: auto;
    }

    .viewer-boot__spinner {
      width: 56px;
      height: 56px;
      border: 3px solid rgba(148, 163, 184, 0.22);
      border-top-color: #60a5fa;
      border-radius: 9999px;
      animation: viewer-boot-spin 1s linear infinite;
    }

    .viewer-boot__title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
    }

    .viewer-boot__subtitle {
      font-size: 0.925rem;
      color: #93c5fd;
    }

    @keyframes viewer-boot-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="text/javascript">
    console.time('scriptToView');
    window.PUBLIC_URL = '<%= PUBLIC_URL %>';

    // Performance: Suppress high-frequency OpenJPEG decoder logs
    // These synchronous logs block the main thread during volume decode
    (function () {
      const originalLog = console.log;
      const originalInfo = console.info;
      const blockedPatterns = ['j2k', 'header of tile', 'main header'];

      function shouldBlock(args) {
        if (!args || args.length === 0) return false;
        const msg = String(args[0]).toLowerCase();
        return blockedPatterns.some(p => msg.includes(p));
      }

      console.log = function (...args) {
        if (!shouldBlock(args)) originalLog.apply(console, args);
      };
      console.info = function (...args) {
        if (!shouldBlock(args)) originalInfo.apply(console, args);
      };
    })();
  </script>
